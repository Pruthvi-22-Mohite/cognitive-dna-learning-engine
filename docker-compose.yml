services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: cognitive-dna-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - cognitive-network

  # Backend API (Node.js + Express)
  backend:
    build: ./backend
    container_name: cognitive-dna-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/cognitive-dna?authSource=admin
      - AI_ENGINE_URL=http://ai-engine:8000
      - PORT=5000
    ports:
      - "5001:5000"
    depends_on:
      - mongodb
    networks:
      - cognitive-network

  # AI Engine (Python + FastAPI)
  ai-engine:
    build: ./ai-engine
    container_name: cognitive-dna-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - cognitive-network

  # Frontend (Next.js)
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001/api
    networks:
      - cognitive-network  # or whatever your network name is

networks:
  cognitive-network:
    driver: bridge

volumes:
  mongodb_data:
